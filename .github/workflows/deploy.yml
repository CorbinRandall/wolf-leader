name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-core.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Update Proxmox host checkout
        run: |
          set -euo pipefail
          cd /opt/wolf-leader
          git fetch origin
          git checkout main
          git pull --ff-only origin main

      - name: Deploy to LXC
        run: WOLF_LEADER_BRANCH=main bash /opt/wolf-leader/scripts/deploy-wolf-leader-lxc.sh
