# Unraid overlay — extra bind mounts and host-specific env from .env.
#
#   docker compose -f docker-compose.yml -f docker-compose.unraid.yml up -d

services:
  wolf-leader:
    environment:
      IDE_STORAGE_DB_PATH_HOST: /boot/config/plugins/compose.manager/projects/wolf-leader/data/ide-work.db
      IDE_STORAGE_COMPOSE_PATH: /boot/config/plugins/compose.manager/projects/wolf-leader
      IDE_STORAGE_CONTAINER: wolf-leader
      IDE_STORAGE_PUBLIC_URL: ${IDE_STORAGE_PUBLIC_URL}
      IDE_STORAGE_MCP_URL: ${IDE_STORAGE_MCP_URL}
      IDE_STORAGE_HOST_LABEL: ${IDE_STORAGE_HOST_LABEL:-}
      CURSOR_TRANSCRIPTS_ROOT: ${CURSOR_TRANSCRIPTS_ROOT:-/root/.cursor/projects/root/agent-transcripts}
      COMPOSE_MANAGER_ROOT: /boot/config/plugins/compose.manager/projects
      PORT: ${PORT:-6971}
      MCP_PORT: ${MCP_PORT:-6972}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Unraid-specific bind mounts only. The source tree is NOT live-mounted here
    # and there is no per-start `pip install` — the built image already contains
    # the app and its deps (start.sh launches MCP + REST). For a dev live-mount,
    # add `-f docker-compose.dev.yml`. For semantic search, add
    # `-f docker-compose.embeddings.yml` and rebuild.
    volumes:
      - /boot/config/plugins/compose.manager/projects:/boot/config/plugins/compose.manager/projects
      - /boot/config/plugins:/boot/config/plugins:ro
      - /boot/config/ssh:/boot/config/ssh:ro
      - /mnt/user/appdata:/mnt/user/appdata:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/.cursor/projects/root/agent-transcripts:/root/.cursor/projects/root/agent-transcripts:ro
      - /root/.cursor/plans:/root/.cursor/plans:ro
      - /root:/root:ro
